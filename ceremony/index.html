<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <title>FIFA World Cup 2026 — Champion Ceremony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>

  <!-- Champion data — set before scripts -->
  <script>
    window.WC_CHAMPION = {
      player:     'JOHN ALVARADO',
      country:    'COLOMBIA',
      flag:       '🇨🇴',
      year:       2026,
      lang:       'es',
      onComplete: null,
    };
  </script>
</head>
<body>

<!-- WebGL canvas container -->
<div id="webgl"></div>

<!-- 2D overlays for screen flashes / darkening -->
<canvas id="fxCanvas"></canvas>

<!-- UI layer -->
<div id="ui">

  <!-- Phase 1: FIFA logo -->
  <div id="logoPhase">
    <div id="logo">
      <div id="logoFifa">FIFA</div>
      <div id="logoWC">WORLD CUP</div>
      <div id="logoYear">2026</div>
    </div>
  </div>

  <!-- Phase 2: Champion reveal -->
  <div id="champPhase">
    <div id="spotlight"></div>
    <div id="name"></div>
    <div id="subtitle"></div>
    <div id="country"><span id="flag"></span><span id="countryName"></span></div>
    <div id="cupLine">FIFA WORLD CUP 2026</div>
    <div id="starsWrap">
      <div id="starsTop">★★★★★</div>
      <div id="legendTitle">LEGENDARY MANAGER</div>
      <div id="starsBot">★★★★★</div>
    </div>
    <button id="btn">▶ CONTINUE</button>
  </div>

</div>

<!-- Loading screen -->
<div id="loadScreen">
  <div class="spinner"></div>
  <div class="loadLabel">LOADING CEREMONY</div>
</div>

<!-- Skip hint -->
<div id="skipHint">Press S to skip · Triple-tap to skip</div>

<!-- CDN libs -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

<!-- Modules (load order matters) -->
<script src="utils.js"></script>
<script src="assets.js"></script>
<script src="audio.js"></script>
<script src="particles.js"></script>
<script src="camera.js"></script>
<script src="ui.js"></script>
<script src="timeline.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>

</body>
</html>
