<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pick26Cup — Campeón Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;700;900&display=swap" rel="stylesheet"/>
<style>
/* ── BASE ──────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:'Oswald',sans-serif}

/* bg canvas */
#bg{position:fixed;inset:0;z-index:0}

/* vignette */
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,rgba(0,0,6,.7) 100%)}

/* ── START SCREEN ──────────────────────────────────────────────────────────── */
#start{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  background:linear-gradient(180deg,#00000f 0%,#00000a 60%,#000014 100%)}
#start .eyebrow{font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:clamp(.55rem,1.3vw,.78rem);letter-spacing:.6em;color:#3a4a7a;
  text-transform:uppercase;margin-bottom:32px}
#start .logo-ring{width:clamp(90px,15vw,130px);height:clamp(90px,15vw,130px);
  border-radius:50%;border:1px solid rgba(212,175,55,.3);
  display:flex;align-items:center;justify-content:center;margin-bottom:32px;
  box-shadow:0 0 40px rgba(212,175,55,.12),inset 0 0 40px rgba(212,175,55,.05);
  animation:ring-pulse 3s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 40px rgba(212,175,55,.12),inset 0 0 40px rgba(212,175,55,.05)}
  50%{box-shadow:0 0 70px rgba(212,175,55,.22),inset 0 0 60px rgba(212,175,55,.1)}}
#start .logo-ring img{width:65%;height:65%;border-radius:50%;object-fit:cover}
#start .logo-ring .fallback{font-size:clamp(1.8rem,4vw,3rem);line-height:1}
#start h1{font-size:clamp(1.8rem,5.5vw,4rem);font-weight:700;letter-spacing:.12em;
  text-align:center;text-transform:uppercase;color:#fff;
  text-shadow:0 0 60px rgba(212,175,55,.3)}
#start h1 em{display:block;font-style:normal;font-size:.38em;font-weight:300;
  letter-spacing:.45em;color:#d4af37;font-family:'Montserrat',sans-serif;margin-top:6px}
#start .year{font-size:clamp(5rem,16vw,12rem);font-weight:700;line-height:1;
  background:linear-gradient(135deg,#ffe066 0%,#d4af37 40%,#b8860b 70%,#ffe066 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(212,175,55,.5));margin:8px 0 40px}
#start .cta{border:1px solid rgba(212,175,55,.5);color:#d4af37;background:none;
  padding:14px 52px;font-family:'Oswald',sans-serif;font-size:clamp(.8rem,1.8vw,1rem);
  font-weight:500;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden}
#start .cta::after{content:'';position:absolute;inset:0;
  background:rgba(212,175,55,0);transition:background .3s}
#start .cta:hover::after{background:rgba(212,175,55,.08)}
#start .cta span{position:relative;z-index:1}

/* ── CEREMONY SCREEN ───────────────────────────────────────────────────────── */
#ceremony{position:fixed;inset:0;z-index:20;display:none;
  flex-direction:column;align-items:center;justify-content:center}

/* canvas fireworks */
#fw{position:fixed;inset:0;z-index:21;pointer-events:none}

/* ── GENERIC CARD ─────────────────────────────────────────────────────────── */
.card{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;opacity:0;pointer-events:none;padding:24px}

/* ── ROUND CARD ──────────────────────────────────────────────────────────── */
#card-round .sub{font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:clamp(.55rem,1.3vw,.78rem);letter-spacing:.55em;color:#3a4a88;
  text-transform:uppercase;margin-bottom:10px}
#card-round .rt{font-size:clamp(2.8rem,9vw,7rem);font-weight:700;letter-spacing:.18em;
  text-align:center;text-transform:uppercase;color:#fff;
  text-shadow:0 0 60px rgba(180,200,255,.4),0 0 120px rgba(80,110,220,.3)}

/* ── STAT CARD ──────────────────────────────────────────────────────────── */
#card-stat .sl{font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:clamp(.55rem,1.4vw,.82rem);letter-spacing:.45em;color:#4455aa;
  text-transform:uppercase;margin-bottom:10px}
#card-stat .sv{font-size:clamp(4rem,13vw,10rem);font-weight:700;letter-spacing:.02em;
  background:linear-gradient(160deg,#ffe066 0%,#f5c518 28%,#d4af37 55%,#b8860b 85%,#ffe066 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 50px rgba(245,197,24,.7))}

/* ── TOP10 CARD ─────────────────────────────────────────────────────────── */
#card-top10{gap:0;padding:20px}
#card-top10 .hd{font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:clamp(.5rem,1.2vw,.72rem);letter-spacing:.55em;color:#3a4488;
  text-transform:uppercase;margin-bottom:18px}
.t10r{display:flex;align-items:center;gap:14px;width:min(560px,92vw);
  padding:7px 0;border-bottom:1px solid rgba(80,100,160,.1);
  opacity:0;transform:translateX(-30px)}
.t10r:last-child{border-bottom:none}
.t10r .rk{font-size:clamp(.7rem,1.8vw,1.05rem);font-weight:500;color:#d4af37;
  width:2.2em;text-align:right;flex-shrink:0;letter-spacing:.05em}
.t10r .nm{font-size:clamp(.85rem,2.2vw,1.3rem);font-weight:600;letter-spacing:.07em;flex:1;color:#e8eef8}
.t10r .pt{font-size:clamp(.62rem,1.5vw,.88rem);color:#4455aa;
  font-family:'Montserrat',sans-serif;font-weight:300;letter-spacing:.03em}

/* ── CHAMPION CARD ───────────────────────────────────────────────────────── */
#card-champ{gap:14px;text-align:center}
.champ-eyebrow{font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:clamp(.55rem,1.4vw,.82rem);letter-spacing:.55em;color:#7788bb;
  text-transform:uppercase;opacity:0;transform:translateY(10px)}
#champ-trophy{font-size:clamp(3rem,7vw,5.5rem);line-height:1;
  filter:drop-shadow(0 0 30px rgba(212,175,55,.8)) drop-shadow(0 0 80px rgba(212,175,55,.4));
  opacity:0;transform:scale(.6) translateY(20px);margin-bottom:4px}
#champ-name{display:flex;flex-wrap:wrap;justify-content:center;gap:0;
  min-height:1.1em;margin:4px 0}
.cl{display:inline-block;opacity:0;transform:translateY(28px) scale(.7);
  font-size:clamp(2.8rem,10vw,8rem);font-weight:700;letter-spacing:.02em;
  background:linear-gradient(160deg,#ffe88a 0%,#f5c518 22%,#d4af37 48%,#b8860b 72%,#ffe088 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(245,197,24,.95)) drop-shadow(0 0 60px rgba(212,175,55,.5))}
.cl-sp{display:inline-block;width:.28em}
#champ-title{font-size:clamp(.65rem,2vw,1.2rem);font-weight:500;letter-spacing:.38em;
  color:#fff;text-shadow:0 0 30px rgba(255,255,255,.3);
  opacity:0;transform:translateY(10px);text-transform:uppercase}
#champ-country-wrap{display:flex;align-items:center;gap:16px;
  opacity:0;transform:translateY(10px)}
#champ-flag{font-size:clamp(1.8rem,4.5vw,3.5rem);
  filter:drop-shadow(0 0 15px rgba(255,255,255,.3))}
#champ-country{font-size:clamp(1rem,3.2vw,2.4rem);font-weight:700;letter-spacing:.14em;
  color:#d4af37;text-shadow:0 0 40px rgba(212,175,55,.6);text-transform:uppercase}

/* ── CONFETTI CANVAS ─────────────────────────────────────────────────────── */
#conf{position:fixed;inset:0;z-index:25;pointer-events:none;opacity:0}

/* ── SKIP ────────────────────────────────────────────────────────────────── */
#skip{position:fixed;bottom:22px;right:24px;z-index:60;
  border:1px solid rgba(212,175,55,.2);color:rgba(212,175,55,.4);
  background:none;padding:6px 16px;font-size:.65rem;letter-spacing:.2em;
  text-transform:uppercase;cursor:pointer;font-family:'Oswald',sans-serif;
  transition:all .25s;display:none}
#skip:hover{color:#d4af37;border-color:rgba(212,175,55,.55)}

/* spotlight rays */
.ray{position:fixed;top:0;width:2px;height:100%;z-index:2;pointer-events:none;
  transform-origin:top center;opacity:0}
#r1{left:30%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 70%);transform:rotate(-8deg)}
#r2{left:50%;background:linear-gradient(180deg,rgba(212,175,55,.1) 0%,transparent 65%);transform:rotate(0deg)}
#r3{left:70%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 70%);transform:rotate(8deg)}
</style>
</head>
<body>

<!-- background starfield canvas -->
<canvas id="bg"></canvas>
<div class="vig"></div>
<div id="r1" class="ray"></div>
<div id="r2" class="ray"></div>
<div id="r3" class="ray"></div>

<!-- fireworks canvas -->
<canvas id="fw"></canvas>
<!-- confetti canvas -->
<canvas id="conf"></canvas>

<!-- START SCREEN -->
<div id="start">
  <div class="eyebrow">FIFA World Cup 2026 &nbsp;·&nbsp; Ceremonia Oficial</div>
  <div class="logo-ring">
    <img src="logo.jpg" alt="Pick26Cup" onerror="this.parentNode.innerHTML='<span class=\'fallback\'>⚽</span>'"/>
  </div>
  <h1>Pick26Cup<em>Champion Ceremony</em></h1>
  <div class="year">2026</div>
  <button class="cta" id="start-btn"><span>▶ &nbsp; Iniciar Ceremonia</span></button>
</div>

<!-- CEREMONY -->
<div id="ceremony">
  <!-- Round label -->
  <div class="card" id="card-round">
    <div class="sub">Pick26Cup · 2026</div>
    <div class="rt" id="round-text">ROUND 1</div>
  </div>

  <!-- Stat card -->
  <div class="card" id="card-stat">
    <div class="sl" id="stat-label">TOTAL JUGADORES</div>
    <div class="sv" id="stat-value">12,542</div>
  </div>

  <!-- Top 10 -->
  <div class="card" id="card-top10">
    <div class="hd">Top 10 Clasificados · Pick26Cup</div>
    <div id="top10-list"></div>
  </div>

  <!-- Champion -->
  <div class="card" id="card-champ">
    <div class="champ-eyebrow" id="cong">Congratulations</div>
    <div id="champ-trophy">🏆</div>
    <div id="champ-name"></div>
    <div id="champ-title">World Cup Champion · 2026</div>
    <div id="champ-country-wrap">
      <span id="champ-flag">🇨🇴</span>
      <span id="champ-country">Colombia</span>
    </div>
  </div>
</div>

<button id="skip">Skip</button>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
'use strict';
// ─── DATA ────────────────────────────────────────────────────────────────────
const CHAMPION = { name:'JOHN ALVARADO', country:'COLOMBIA', flag:'🇨🇴' };
const TOP10 = [
  {r:10,n:'CARLOS MÉNDEZ',   p:2840},{r:9,n:'LAURA JIMÉNEZ',    p:2910},
  {r:8, n:'ANDRÉS TORRES',   p:2975},{r:7,n:'SOFÍA RAMOS',      p:3040},
  {r:6, n:'DIEGO HERRERA',   p:3120},{r:5,n:'VALENTINA CRUZ',   p:3210},
  {r:4, n:'MIGUEL SANTOS',   p:3290},{r:3,n:'ISABELLA MORA',    p:3380},
  {r:2, n:'SEBASTIÁN RUIZ',  p:3460},{r:1,n:'JOHN ALVARADO',    p:3590},
];
const STATS  = [{l:'TOTAL JUGADORES',v:'12,542'},{l:'PICKS REALIZADOS',v:'93,412'},{l:'RONDAS PERFECTAS',v:'847'}];
const ROUNDS = ['ROUND 1','ROUND 2','ROUND 3','ROUND 4','ROUND 5','ROUND 6','FINAL'];

// ─── BACKGROUND STARFIELD ────────────────────────────────────────────────────
const bgC  = document.getElementById('bg');
const bgCx = bgC.getContext('2d');
let   W = innerWidth, H = innerHeight;
function resizeBg(){ W=innerWidth; H=innerHeight; bgC.width=W; bgC.height=H; }
resizeBg();
window.addEventListener('resize', resizeBg);

const STARS = Array.from({length: 280}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.2 + .2,
  a: Math.random(), speed: .0003+Math.random()*.0006,
  twinkleOffset: Math.random()*Math.PI*2,
}));

// stadium silhouette segments
const BLEACHERS = [
  {x:.03,w:.12,h:.26},{x:.16,w:.08,h:.22},{x:.25,w:.06,h:.18},
  {x:.69,w:.06,h:.18},{x:.76,w:.08,h:.22},{x:.85,w:.12,h:.26},
];

let bgT = 0;
function drawBg(dt) {
  bgT += dt;
  bgCx.fillStyle = 'rgba(0,0,8,1)';
  bgCx.fillRect(0,0,W,H);

  // gradient horizon
  const grd = bgCx.createLinearGradient(0, H*.35, 0, H);
  grd.addColorStop(0, 'rgba(6,10,30,0)');
  grd.addColorStop(.5, 'rgba(3,5,18,.6)');
  grd.addColorStop(1, 'rgba(0,0,6,1)');
  bgCx.fillStyle = grd;
  bgCx.fillRect(0, H*.35, W, H*.65);

  // stars
  for (const s of STARS) {
    const a = s.a * (.5 + .5*Math.sin(bgT*s.speed*200 + s.twinkleOffset));
    bgCx.beginPath();
    bgCx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgCx.fillStyle = `rgba(200,210,255,${a})`;
    bgCx.fill();
  }

  // stadium bleachers at bottom
  bgCx.fillStyle = 'rgba(8,10,22,1)';
  for (const b of BLEACHERS) {
    bgCx.fillRect(b.x*W, H*(1-b.h), b.w*W, H*b.h);
  }

  // crowd glow from bleachers
  const cGrd = bgCx.createLinearGradient(0, H*.72, 0, H);
  cGrd.addColorStop(0, `rgba(180,160,100,${.06+.03*Math.sin(bgT*.3)})`);
  cGrd.addColorStop(.4, 'rgba(60,80,180,.04)');
  cGrd.addColorStop(1, 'rgba(0,0,0,0)');
  bgCx.fillStyle = cGrd;
  bgCx.fillRect(0, H*.72, W, H*.28);

  // crowd dots
  bgCx.save();
  for (let i = 0; i < 120; i++) {
    const x = (i/120)*W + Math.sin(bgT*.15+i*.8)*8;
    const y = H*.75 + Math.sin(i*1.7)*(H*.08) + Math.sin(bgT*.4+i*.3)*3;
    const t = (i%3)/2;
    const a = .18 + .12*Math.sin(bgT*.5+i*1.1);
    if(t<.5) bgCx.fillStyle = `rgba(240,224,180,${a})`;
    else if(t<.75) bgCx.fillStyle = `rgba(120,160,255,${a})`;
    else bgCx.fillStyle = `rgba(255,200,50,${a})`;
    bgCx.beginPath();
    bgCx.arc(x, y, 1.5+Math.sin(i)*0.5, 0, Math.PI*2);
    bgCx.fill();
  }
  bgCx.restore();
}

// ─── FIREWORKS (canvas 2D) ────────────────────────────────────────────────────
const fwC  = document.getElementById('fw');
const fwCx = fwC.getContext('2d');
function resizeFw(){ fwC.width=innerWidth; fwC.height=innerHeight; }
resizeFw();
window.addEventListener('resize', resizeFw);

class Particle {
  constructor(x,y){
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2, s=3+Math.random()*5;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=.012+Math.random()*.02;
    const r=Math.random();
    if(r<.45) this.color=[255,Math.round(200+Math.random()*55),30];      // gold
    else if(r<.7) this.color=[255,255,Math.round(220+Math.random()*35)]; // white
    else if(r<.85) this.color=[100,180,255];                              // blue
    else this.color=[255,100,100];                                        // red
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=.09; this.vx*=.97; this.life-=this.decay; }
  dead(){ return this.life<=0; }
  draw(cx){
    cx.beginPath();
    cx.arc(this.x, this.y, 2.2*this.life, 0, Math.PI*2);
    cx.fillStyle=`rgba(${this.color.join(',')},${this.life})`;
    cx.fill();
  }
}

const particles = [];
let burstTimer = null;

function burst(x,y){
  const n = 80 + Math.floor(Math.random()*40);
  for(let i=0;i<n;i++) particles.push(new Particle(x,y));
}
function randomBurst(){
  burst(W*(.2+Math.random()*.6), H*(.1+Math.random()*.4));
}
function startBursts(rate=1200){
  clearInterval(burstTimer);
  randomBurst();
  burstTimer=setInterval(randomBurst, rate);
}
function stopBursts(){ clearInterval(burstTimer); burstTimer=null; }
function megaBurst(){
  for(let i=0;i<8;i++) setTimeout(()=>randomBurst(), i*100);
}

function drawFw(){
  fwCx.clearRect(0,0,fwC.width,fwC.height);
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();
    particles[i].draw(fwCx);
    if(particles[i].dead()) particles.splice(i,1);
  }
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
const confC  = document.getElementById('conf');
const confCx = confC.getContext('2d');
function resizeConf(){ confC.width=innerWidth; confC.height=innerHeight; }
resizeConf();
window.addEventListener('resize', resizeConf);

const CONF_COLS = ['#d4af37','#f5c518','#ffffff','#ff4444','#4488ff','#44ff88','#ff88cc'];
const confPieces = Array.from({length:160}, ()=>({
  x:Math.random()*innerWidth, y:-Math.random()*innerHeight,
  vx:(Math.random()-.5)*2.5, vy:1.5+Math.random()*2.5,
  rot:Math.random()*360, rotV:(Math.random()-.5)*6,
  w:8+Math.random()*10, h:4+Math.random()*5,
  col:CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)],
}));

function drawConf(){
  confCx.clearRect(0,0,confC.width,confC.height);
  for(const p of confPieces){
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
    if(p.y>confC.height+20){p.y=-20;p.x=Math.random()*confC.width;}
    confCx.save();
    confCx.translate(p.x,p.y); confCx.rotate(p.rot*Math.PI/180);
    confCx.fillStyle=p.col; confCx.globalAlpha=.85;
    confCx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCx.restore();
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastT = performance.now(), showConf = false, showFw = false;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(), dt=(now-lastT)/1000; lastT=now;
  drawBg(dt);
  if(showFw) drawFw();
  if(showConf) drawConf();
}
loop();

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let actx, masterGain, crowdGain;
function initAudio(){
  actx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value=.75;
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value=-18; comp.ratio.value=4;
  masterGain.connect(comp); comp.connect(actx.destination);
}
function _osc(f,t,g,dur,at){
  const o=actx.createOscillator(),gn=actx.createGain();
  o.type=t; o.frequency.value=f;
  gn.gain.setValueAtTime(g,at); gn.gain.exponentialRampToValueAtTime(.0001,at+dur);
  o.connect(gn); gn.connect(masterGain); o.start(at); o.stop(at+dur+.05);
}
function _pink(buf){
  const d=buf.getChannelData(0); let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<buf.length;i++){
    const w=Math.random()*2-1;
    b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.1538520;
    b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11; b6=w*.115926;
  }
}
function startCrowd(vol=.22){
  if(!actx)return;
  const buf=actx.createBuffer(1,actx.sampleRate*8,actx.sampleRate); _pink(buf);
  const src=actx.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1600;
  crowdGain=actx.createGain(); crowdGain.gain.setValueAtTime(0,actx.currentTime);
  crowdGain.gain.linearRampToValueAtTime(vol,actx.currentTime+3);
  src.connect(lp); lp.connect(crowdGain); crowdGain.connect(masterGain); src.start();
}
function swellCrowd(v,d=2){ if(crowdGain) crowdGain.gain.linearRampToValueAtTime(v,actx.currentTime+d); }
function quietCrowd(v,d=2){ if(crowdGain) crowdGain.gain.linearRampToValueAtTime(v,actx.currentTime+d); }
function playFanfare(){
  if(!actx)return; const t=actx.currentTime+.05;
  [220,261.63,329.63,440,523.25,659.25].forEach(f=>_osc(f,'sawtooth',.06,2.8,t));
  [[392,0],[466.16,.3],[587.33,.58],[698.46,.86],[880,1.1],[880,1.45]]
    .forEach(([f,dt])=>_osc(f,'sine',.11,.42,t+dt));
}
function playBoom(){
  if(!actx)return; const t=actx.currentTime;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(24,t+.4);
  g.gain.setValueAtTime(.7,t); g.gain.exponentialRampToValueAtTime(.0001,t+.55);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+.6);
}
function playShimmer(){
  if(!actx)return; const t=actx.currentTime;
  [1046.5,1318.51,1568,2093,2637].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.06); g.gain.linearRampToValueAtTime(.03,t+i*.06+.1);
    g.gain.exponentialRampToValueAtTime(.0001,t+i*.06+1.1);
    o.connect(g); g.connect(masterGain); o.start(t+i*.06); o.stop(t+i*.06+1.2);
  });
}
function playOrchHit(){
  if(!actx)return; const t=actx.currentTime;
  [146.83,185,220,293.66,370,440,587.33].forEach(f=>{
    _osc(f,'sawtooth',.09,3.8,t); _osc(f*2,'sine',.04,3.2,t);
  });
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);

function showCard(id, cb){
  const el=$(id);
  el.style.pointerEvents='auto';
  gsap.to(el,{opacity:1,duration:.6,ease:'power2.out'});
  return () => gsap.to(el,{opacity:0,duration:.6,ease:'power2.in',onComplete:()=>{
    el.style.pointerEvents='none'; if(cb) cb();
  }});
}

function showRound(text, cb){
  $('round-text').textContent = text;
  const hide = showCard('card-round');
  gsap.delayedCall(2, ()=>{ hide(cb); });
}

function showStat(label, value, cb){
  $('stat-label').textContent=label;
  $('stat-value').textContent=value;
  const hide = showCard('card-stat');
  gsap.delayedCall(2.8, ()=>{ hide(cb); });
}

function showTop10(cb){
  const list = $('top10-list'); list.innerHTML='';
  [...TOP10].sort((a,b)=>a.r-b.r).forEach(e=>{
    const row=document.createElement('div'); row.className='t10r';
    row.innerHTML=`<span class="rk">#${e.r}</span><span class="nm">${e.n}</span><span class="pt">${e.p.toLocaleString()} pts</span>`;
    list.appendChild(row);
  });
  $('card-top10').style.pointerEvents='auto';
  const rows = list.querySelectorAll('.t10r');
  gsap.timeline({onComplete:cb})
    .to($('card-top10'),{opacity:1,duration:.5})
    .to(rows,{opacity:1,x:0,duration:.4,stagger:.06,ease:'power2.out'},'-=.05')
    .to($('card-top10'),{opacity:0,duration:.8,ease:'power2.in',delay:3.8},
      ()=>$('card-top10').style.pointerEvents='none');
}

function buildLetters(){
  const nm = $('champ-name'); nm.innerHTML='';
  for(const ch of CHAMPION.name){
    if(ch===' '){const s=document.createElement('span');s.className='cl-sp';nm.appendChild(s);}
    else{const s=document.createElement('span');s.className='cl';s.textContent=ch;nm.appendChild(s);}
  }
}

function revealChampion(){
  buildLetters();
  const cc=$('card-champ'); cc.style.opacity='1'; cc.style.pointerEvents='auto';
  const letters=$('champ-name').querySelectorAll('.cl');
  gsap.timeline()
    .to($('cong'),{opacity:1,y:0,duration:1.0,ease:'power2.out'})
    .to($('champ-trophy'),{opacity:1,scale:1,y:0,duration:.9,ease:'back.out(1.8)'},'+=.1')
    .to(letters,{opacity:1,y:0,scale:1,duration:.38,stagger:.07,ease:'back.out(1.7)',
      onComplete:()=>{
        playOrchHit(); swellCrowd(.9,1.5);
        showConf=true; showFw=true; startBursts(700);
        megaBurst(); megaBurst();
        // spotlight rays
        gsap.to('.ray',{opacity:1,duration:1.2,stagger:.1});
      }
    },'+=.55')
    .to($('champ-title'),{opacity:1,y:0,duration:.8,ease:'power2.out'},'+=.3')
    .to($('champ-country-wrap'),{opacity:1,y:0,duration:.7,ease:'power2.out'},'+=.15');
}

// ─── MASTER TIMELINE ──────────────────────────────────────────────────────────
function startCeremony(){
  const cer = $('ceremony'); cer.style.display='flex';
  $('skip').style.display='block';
  startCrowd(.2);

  const tl = gsap.timeline();

  // Stats (starts immediately)
  tl.call(()=>{
    let idx=0;
    function nextStat(){
      if(idx<STATS.length){
        const s=STATS[idx++];
        showStat(s.l,s.v,()=>setTimeout(nextStat,400));
      }
    }
    nextStat();
  })

  // Rounds (11s)
  .call(()=>{
    swellCrowd(.42,2);
    let i=0;
    function nextRound(){
      if(i<ROUNDS.length) showRound(ROUNDS[i++],()=>setTimeout(nextRound,200));
    }
    nextRound();
  },[],11)

  // Top 10 (26s)
  .call(()=>{
    swellCrowd(.58,2);
    showTop10(null);
  },[],26)

  // Silence (40s)
  .call(()=>{ quietCrowd(.03,2.5); },[],40)

  // Fanfare (43s)
  .call(()=>{
    playFanfare(); playBoom();
    swellCrowd(.5,1.5);
    setTimeout(()=>playBoom(),600);
    showFw=true; startBursts(1400);
  },[],43)

  // Trophy + shimmer (47s)
  .call(()=>{
    swellCrowd(.28,2);
    quietCrowd(.05,3);
    stopBursts();
    showFw=false;
    playShimmer();
  },[],47)

  // Champion reveal (52s)
  .call(()=>revealChampion(),[],52);
}

// ─── SKIP ─────────────────────────────────────────────────────────────────────
$('skip').addEventListener('click',()=>{
  gsap.globalTimeline.clear();
  stopBursts();
  ['card-round','card-stat','card-top10'].forEach(id=>{
    const el=$(id); gsap.killTweensOf(el); gsap.set(el,{opacity:0});
    el.style.pointerEvents='none';
  });
  revealChampion();
});

// ─── LAUNCH ──────────────────────────────────────────────────────────────────
$('start-btn').addEventListener('click', go);
$('start').addEventListener('click', e=>{ if(e.target===$('start')) go(); });

function go(){
  if(!actx) initAudio();
  $('start').style.pointerEvents='none';
  gsap.to($('start'),{opacity:0,duration:1.2,ease:'power2.in',
    onComplete(){$('start').style.display='none'; startCeremony();}
  });
}
</script>
