<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AAA Cinematic Engine · Pick26Cup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',system-ui,sans-serif;color:#fff}

#container{position:fixed;inset:0;z-index:0}
#container canvas{display:block}

/* ── PANEL ── */
#ui{
  position:fixed;top:20px;left:20px;z-index:100;
  background:rgba(0,0,0,.78);backdrop-filter:blur(14px);
  border:1px solid rgba(212,175,55,.28);border-radius:10px;
  padding:18px;width:310px;display:flex;flex-direction:column;gap:10px
}
#ui h2{font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;
  color:#d4af37;font-weight:500;margin-bottom:2px}
label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.38);display:block;margin-bottom:3px}
input,textarea{
  width:100%;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);border-radius:6px;
  color:#fff;padding:8px 10px;font-size:.8rem;outline:none;
  font-family:inherit;resize:none}
input:focus,textarea:focus{border-color:rgba(212,175,55,.5)}
textarea{height:56px}
.row{display:flex;gap:8px}
.btn{flex:1;padding:9px;border:none;border-radius:6px;font-size:.73rem;
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;transition:all .2s}
#btn-demo{background:rgba(255,255,255,.1);color:#fff;
  border:1px solid rgba(255,255,255,.2)}
#btn-demo:hover{background:rgba(255,255,255,.18)}
#btn-generate{background:#d4af37;color:#000}
#btn-generate:hover{background:#ffe066}
#btn-generate:disabled{opacity:.45;cursor:not-allowed}

/* ── STATUS ── */
#status{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:100;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.3);pointer-events:none}

/* ── JSON OUT ── */
#json-panel{
  position:fixed;top:20px;right:20px;z-index:100;
  background:rgba(0,0,0,.82);backdrop-filter:blur(12px);
  border:1px solid rgba(80,120,200,.3);border-radius:8px;
  width:360px;max-height:80vh;display:flex;flex-direction:column;
  overflow:hidden}
#json-panel[hidden]{display:none}
.json-hdr{
  padding:9px 14px;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  color:#5588ff;border-bottom:1px solid rgba(80,120,200,.2);
  display:flex;justify-content:space-between;align-items:center}
.json-hdr button{background:none;border:none;color:rgba(255,255,255,.4);
  cursor:pointer;font-size:.9rem;line-height:1}
#json-out{
  overflow-y:auto;padding:12px;
  font-family:'SFMono-Regular',Consolas,monospace;font-size:.7rem;
  line-height:1.6;color:#8eb9ff;white-space:pre;word-break:break-all}
</style>
</head>
<body>

<div id="container"></div>

<!-- UI Panel -->
<div id="ui">
  <h2>⚡ AAA Cinematic Engine</h2>
  <div>
    <label>Claude API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-api03-…"/>
  </div>
  <div>
    <label>Prompt cinematográfico</label>
    <textarea id="prompt" placeholder="Ej: Intro épico Mundial FIFA 2026 estilo Champions League…"></textarea>
  </div>
  <div class="row">
    <button class="btn" id="btn-demo">▶ Demo</button>
    <button class="btn" id="btn-generate">🎬 Generar IA</button>
  </div>
</div>

<div id="status">Pick26Cup · AAA Engine · Three.js + GSAP + Claude AI</div>

<!-- JSON Preview -->
<div id="json-panel" hidden>
  <div class="json-hdr">
    <span>Scene JSON generado por Claude</span>
    <button onclick="document.getElementById('json-panel').hidden=true">✕</button>
  </div>
  <pre id="json-out"></pre>
</div>

<!-- Three.js + GSAP via importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
  }
}
</script>

<script type="module" src="main.js"></script>
</body>
</html>
