<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cargador Jornada 4 — Pick26Cup</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:24px;max-width:700px;margin:0 auto}
h2{color:#F1C40F}
.log{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-top:16px;min-height:120px}
.ok{color:#2ECC71}.err{color:#E74C3C}.warn{color:#F39C12}.info{color:#3498DB}
button{background:#F1C40F;color:#000;border:none;padding:10px 24px;border-radius:6px;font-size:16px;cursor:pointer;margin-top:12px;font-weight:700}
button:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<h2>⚽ Pick26Cup — Cargador de Resultados Jornada 4</h2>
<p style="color:#aaa">Este script carga los resultados correctos de la Jornada 4 directamente en Firebase.<br>
Presiona el botón y espera a que termine.</p>

<button id="btn" onclick="run()">🚀 Cargar Resultados Jornada 4</button>

<div class="log" id="log"><span class="info">Listo para ejecutar...</span></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAt-YPPSX2jFsA-VtdZn6dlIWgdOR45eBQ",
  authDomain: "your-world-cup-prediction.firebaseapp.com",
  databaseURL: "https://your-world-cup-prediction-default-rtdb.firebaseio.com",
  projectId: "your-world-cup-prediction",
  messagingSenderId: "167527835666",
  appId: "1:167527835666:web:a7b19da5a01e1de04c90cb"
};

// Resultados confirmados Jornada 4 (Round of 32 — Mundial 2026)
const RESULTADOS = [
  // 28 jun
  { id:'4_1', home:'Sudáfrica',        away:'Canadá',             scoreH:0, scoreA:1 },
  // 29 jun
  { id:'4_2', home:'Brasil',           away:'Japón',              scoreH:2, scoreA:1 },
  { id:'4_3', home:'Alemania',         away:'Paraguay',           scoreH:1, scoreA:1, winner:'away' }, // PEN: Paraguay 4-3
  { id:'4_4', home:'Países Bajos',     away:'Marruecos',          scoreH:1, scoreA:1, winner:'away' }, // PEN: Marruecos 3-2
  // 30 jun
  { id:'4_5', home:'Costa de Marfil',  away:'Noruega',            scoreH:1, scoreA:2 },
  { id:'4_6', home:'Francia',          away:'Suecia',             scoreH:3, scoreA:0 },
  { id:'4_7', home:'México',           away:'Ecuador',            scoreH:2, scoreA:0 },
  // 01 jul
  { id:'4_8', home:'Inglaterra',       away:'Congo',              scoreH:2, scoreA:1 },
];

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function run() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('Iniciando...', 'info');

  // Init Firebase
  let app, db, auth;
  try {
    app = firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    auth = firebase.auth();
    log('✅ Firebase inicializado', 'ok');
  } catch(e) {
    log('❌ Error iniciando Firebase: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  // Sign in
  log('🔐 Autenticando como admin@pick26.app...', 'info');
  try {
    await auth.signInWithEmailAndPassword('admin@pick26.app', 'aFt0Fzn-M0Qcbb01-FKMXGK68s-K4wrU');
    log('✅ Autenticación exitosa', 'ok');
  } catch(e) {
    log('❌ Auth falló: ' + e.code + ' — ' + e.message, 'err');
    log('⚠️ Crea el usuario admin@pick26.app en Firebase Console → Authentication → Users', 'warn');
    btn.disabled = false;
    return;
  }

  // Write results — with locked:true so nobody can change them
  log('', '');
  log('📝 Escribiendo y bloqueando resultados...', 'info');
  const now = Date.now();
  let ok = 0, fail = 0, skipped = 0;

  for (const r of RESULTADOS) {
    const data = { scoreH: r.scoreH, scoreA: r.scoreA, updatedAt: now, locked: true, lockedAt: now };
    if (r.winner) data.winner = r.winner;
    const scoreStr = r.scoreH + '-' + r.scoreA + (r.winner ? ' (PEN: ' + (r.winner==='home'?r.home:r.away) + ')' : '');
    try {
      // Check if already locked in Firebase
      const snap = await db.ref('results/' + r.id).once('value');
      const existing = snap.val();
      if (existing && existing.locked) {
        log(`🔒 ${r.id} — ${r.home} ${scoreStr} ${r.away} — ya bloqueado, no se modifica`, 'warn');
        skipped++;
        continue;
      }
      await db.ref('results/' + r.id).set(data);
      log(`✅🔒 ${r.id} — ${r.home} ${scoreStr} ${r.away} — guardado y BLOQUEADO`, 'ok');
      ok++;
    } catch(e) {
      log(`❌ ${r.id} — ${r.home} vs ${r.away} — ERROR: ${e.message}`, 'err');
      if (e.message && e.message.includes('PERMISSION_DENIED')) {
        log('⚠️ Firebase rechazó la escritura — verifica que las reglas de seguridad permitan escritura desde password auth', 'warn');
      }
      fail++;
    }
  }

  log('', '');
  log(`🏁 Listo: ${ok} guardados+bloqueados, ${skipped} ya bloqueados, ${fail} errores`, fail === 0 ? 'ok' : 'warn');
  if (fail === 0) {
    log('✅ Resultados cargados y bloqueados. Ya nadie puede cambiarlos. Puedes cerrar esta página.', 'ok');
  }

  btn.disabled = false;
}
</script>
</body>
</html>
